<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>超市語文大冒險</title>
    <style>
        :root { --main: #2ecc71; --bg: #f5f6fa; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #222; font-family: 'PingFang TC', sans-serif; }
        
        /* 遊戲舞台 */
        #stage { 
            position: relative; width: 100%; height: 100%; max-width: 500px; margin: 0 auto; 
            background: linear-gradient(to bottom, #a1c4fd 0%, #c2e9fb 100%); 
            overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* 動態超市地板線 */
        #floor {
            position: absolute; top: 0; left: 0; width: 100%; height: 200%;
            background-image: linear-gradient(#ddd 2px, transparent 2px);
            background-size: 100% 80px;
            animation: moveFloor 2s linear infinite;
            z-index: 1; opacity: 0.3;
        }
        @keyframes moveFloor { from { transform: translateY(-80px); } to { transform: translateY(0); } }

        /* 頂部目標 UI */
        .header {
            position: absolute; top: 20px; left: 0; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 100;
        }
        #target-card {
            background: white; border: 4px solid var(--main); border-radius: 20px; padding: 10px 40px;
            text-align: center; cursor: pointer; pointer-events: auto; box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }
        #target-card:active { transform: scale(0.95); }
        #score-board { color: #2c3e50; font-weight: bold; margin-top: 10px; font-size: 18px; text-shadow: 1px 1px 0 #fff; }

        /* 購物車玩家 */
        #player {
            position: absolute; bottom: 80px; width: 90px; height: 90px;
            display: flex; align-items: center; justify-content: center;
            font-size: 50px; z-index: 50; transition: left 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
        }

        /* 單字障礙物 */
        .word-item {
            position: absolute; width: 110px; height: 120px;
            background: white; border-radius: 15px; border-bottom: 5px solid #bdc3c7;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold; z-index: 10; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .word-item i { font-size: 30px; margin-bottom: 5px; font-style: normal; }

        /* 遮罩與按鈕 */
        #overlay {
            position: absolute; inset: 0; background: rgba(46, 204, 113, 0.9);
            z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;
        }
        .btn {
            background: white; color: var(--main); border: none; padding: 15px 50px;
            font-size: 24px; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 20px;
        }

        /* 答對特效 */
        .flash-success { animation: successEffect 0.4s; }
        @keyframes successEffect {
            0% { background: white; }
            50% { background: #2ecc71; transform: scale(1.1); }
            100% { background: white; }
        }
    </style>
</head>
<body>

<div id="stage">
    <div id="floor"></div>
    
    <div class="header">
        <div id="target-card" onclick="speak()">
            <div style="font-size:14px; color:#7f8c8d;">目前的目標 (點擊發音)</div>
            <div id="target-word" style="font-size:32px; color:#2c3e50;">載入中</div>
        </div>
        <div id="score-board">💰 分數: 0</div>
    </div>

    <div id="player">🛒</div>

    <div id="overlay">
        <h1 style="font-size: 40px; margin: 0;">超市語文跑酷</h1>
        <p>聽音辨字，收集正確物品！</p>
        <button class="btn" onclick="start()">開始遊戲</button>
        <p style="font-size: 14px; margin-top: 20px;">使用鍵盤 ← → 或點擊畫面左右</p>
    </div>
</div>
